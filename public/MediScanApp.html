<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MediScan AI — Clinical Diagnostic Platform</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚕️</text></svg>"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  :root {
    --bg:#030a0e;--surface:#071419;--surface2:#0c1f27;--border:#0e3040;--border2:#1a4a5e;
    --accent:#00d4ff;--accent2:#00ff9d;--accent3:#ff6b35;
    --text:#e8f4f8;--text2:#7ab3c4;--text3:#3d7a8e;
    --danger:#ff3d5a;--warn:#ffab00;--success:#00ff9d;--purple:#a78bfa;
    --glow:0 0 30px rgba(0,212,255,0.15);
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;overflow-x:hidden;}
  #root{min-height:100vh;}
  ::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-track{background:var(--bg);}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
  #three-canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;opacity:0.35;}
  .app-shell{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;}

  /* HEADER */
  .header{padding:18px 40px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);backdrop-filter:blur(20px);background:rgba(3,10,14,0.88);position:sticky;top:0;z-index:100;}
  .logo{display:flex;align-items:center;gap:12px;}
  .logo-icon{width:34px;height:34px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:var(--glow);}
  .logo-text{font-family:'Syne',sans-serif;font-weight:800;font-size:18px;letter-spacing:-0.5px;}
  .logo-text span{color:var(--accent);}
  .header-badge{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--accent2);border:1px solid rgba(0,255,157,0.3);padding:3px 10px;border-radius:20px;}
  .header-right{display:flex;align-items:center;gap:12px;}
  .status-dot{width:7px;height:7px;border-radius:50%;background:var(--accent2);box-shadow:0 0 8px var(--accent2);animation:pulse 2s infinite;}
  .status-text{font-size:10px;color:var(--text2);letter-spacing:1px;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.35}}

  /* LAYOUT */
  .main{display:flex;flex:1;min-height:calc(100vh - 62px);}
  .left-panel{width:400px;min-width:400px;border-right:1px solid var(--border);display:flex;flex-direction:column;background:rgba(7,20,25,0.72);backdrop-filter:blur(10px);overflow-y:auto;}
  .panel-section{padding:22px;border-bottom:1px solid var(--border);}
  .section-label{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--text3);margin-bottom:14px;display:flex;align-items:center;gap:8px;}
  .section-label::after{content:'';flex:1;height:1px;background:var(--border);}

  /* Scan Tabs */
  .scan-types{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
  .scan-type-btn{padding:11px 6px;border-radius:8px;cursor:pointer;border:1px solid var(--border);background:transparent;text-align:center;transition:all 0.2s;color:var(--text2);font-family:'DM Mono',monospace;}
  .scan-type-btn.active{border-color:var(--accent);background:rgba(0,212,255,0.08);color:var(--accent);}
  .scan-type-icon{font-size:18px;margin-bottom:5px;}
  .scan-type-label{font-size:9px;letter-spacing:1px;text-transform:uppercase;}

  /* Upload */
  .upload-zone{border:1.5px dashed var(--border2);border-radius:10px;padding:30px 18px;text-align:center;cursor:pointer;transition:all 0.3s;background:rgba(0,212,255,0.02);}
  .upload-zone:hover,.upload-zone.drag-over{border-color:var(--accent);background:rgba(0,212,255,0.05);box-shadow:var(--glow);}
  .upload-icon{font-size:30px;margin-bottom:9px;}
  .upload-title{font-family:'Syne',sans-serif;font-size:13px;font-weight:600;margin-bottom:4px;}
  .upload-sub{font-size:10px;color:var(--text3);line-height:1.6;}
  input[type=file]{display:none;}
  .preview-area{margin-top:12px;border-radius:8px;overflow:hidden;position:relative;background:#000;border:1px solid var(--border);}
  .preview-area img{width:100%;display:block;max-height:190px;object-fit:contain;}
  .preview-overlay{position:absolute;top:6px;right:6px;background:rgba(0,0,0,0.82);border:1px solid var(--border2);border-radius:4px;padding:3px 7px;font-size:8px;letter-spacing:1px;color:var(--accent);}
  .preview-remove{position:absolute;top:6px;left:6px;background:rgba(255,61,90,0.2);border:1px solid var(--danger);border-radius:4px;padding:3px 7px;cursor:pointer;font-size:8px;color:var(--danger);letter-spacing:1px;}

  /* Form */
  .form-row{margin-bottom:12px;}
  .form-label{font-size:9px;letter-spacing:2px;color:var(--text3);margin-bottom:5px;display:block;text-transform:uppercase;}
  .form-input,.form-select{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:9px 12px;color:var(--text);font-family:'DM Mono',monospace;font-size:12px;transition:border-color 0.2s;outline:none;}
  .form-input:focus,.form-select:focus{border-color:var(--accent);}
  .form-select option{background:var(--surface2);}
  .form-row-2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

  /* Analyze Button */
  .analyze-btn{width:100%;padding:15px;background:linear-gradient(135deg,#0080c8,var(--accent));border:none;border-radius:9px;cursor:pointer;font-family:'Syne',sans-serif;font-weight:700;font-size:13px;letter-spacing:1px;color:#000;text-transform:uppercase;transition:all 0.3s;box-shadow:0 0 25px rgba(0,212,255,0.3);display:flex;align-items:center;justify-content:center;gap:8px;}
  .analyze-btn:hover{transform:translateY(-2px);box-shadow:0 0 45px rgba(0,212,255,0.5);}
  .analyze-btn:disabled{opacity:0.45;cursor:not-allowed;transform:none;}

  /* RIGHT PANEL */
  .right-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;}

  /* Welcome */
  .welcome-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:50px;text-align:center;}
  .welcome-glyph{width:100px;height:100px;border-radius:50%;background:radial-gradient(circle,rgba(0,212,255,0.12),transparent 70%);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:44px;margin:0 auto 26px;animation:float 4s ease-in-out infinite;}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
  .welcome-title{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;letter-spacing:-1px;margin-bottom:10px;background:linear-gradient(135deg,var(--text),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
  .welcome-sub{font-family:'Instrument Serif',serif;font-style:italic;font-size:14px;color:var(--text2);max-width:420px;line-height:1.7;margin-bottom:32px;}
  .feature-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;max-width:560px;}
  .feature-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;text-align:left;transition:all 0.3s;}
  .feature-card:hover{border-color:var(--border2);box-shadow:var(--glow);}
  .feature-card-icon{font-size:20px;margin-bottom:7px;}
  .feature-card-title{font-family:'Syne',sans-serif;font-size:11px;font-weight:600;margin-bottom:4px;}
  .feature-card-desc{font-size:9px;color:var(--text3);line-height:1.5;}

  /* Loading */
  .loading-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;}
  .scanner-ring{width:88px;height:88px;position:relative;}
  .scanner-ring::before,.scanner-ring::after{content:'';position:absolute;border-radius:50%;border:2px solid transparent;}
  .scanner-ring::before{inset:0;border-top-color:var(--accent);animation:spin 1s linear infinite;}
  .scanner-ring::after{inset:10px;border-top-color:var(--accent2);animation:spin 0.7s linear infinite reverse;}
  @keyframes spin{to{transform:rotate(360deg)}}
  .loading-icon{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:22px;}
  .loading-text{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:var(--accent);}
  .loading-steps{display:flex;flex-direction:column;gap:7px;}
  .loading-step{font-size:10px;color:var(--text3);display:flex;align-items:center;gap:9px;transition:color 0.3s;}
  .loading-step.active{color:var(--accent2);}
  .loading-step.done{color:var(--text2);}
  .step-dot{width:5px;height:5px;border-radius:50%;background:var(--text3);flex-shrink:0;transition:background 0.3s;}
  .loading-step.active .step-dot{background:var(--accent2);box-shadow:0 0 8px var(--accent2);}
  .loading-step.done .step-dot{background:var(--accent2);}

  /* Results */
  .results-container{flex:1;overflow-y:auto;padding:26px;display:flex;flex-direction:column;gap:18px;}

  /* Report Header */
  .report-header-card{background:linear-gradient(135deg,var(--surface),var(--surface2));border:1px solid var(--border2);border-radius:14px;padding:22px;box-shadow:var(--glow);}
  .rh-top{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:16px;}
  .report-tag{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--accent);display:block;margin-bottom:6px;}
  .report-main-title{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;letter-spacing:-0.3px;margin-bottom:3px;}
  .report-meta{font-size:10px;color:var(--text2);}
  .severity-badge{flex-shrink:0;padding:8px 16px;border-radius:30px;font-family:'Syne',sans-serif;font-weight:700;font-size:11px;letter-spacing:1px;text-transform:uppercase;}
  .sev-low{background:rgba(0,255,157,0.12);color:var(--success);border:1px solid var(--success);}
  .sev-medium{background:rgba(255,171,0,0.12);color:var(--warn);border:1px solid var(--warn);}
  .sev-high{background:rgba(255,61,90,0.12);color:var(--danger);border:1px solid var(--danger);}
  .sev-critical{background:rgba(255,61,90,0.25);color:var(--danger);border:1px solid var(--danger);box-shadow:0 0 18px rgba(255,61,90,0.25);}
  .meta-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px;}
  .meta-item{background:rgba(0,0,0,0.3);border:1px solid var(--border);border-radius:7px;padding:9px 11px;}
  .meta-key{font-size:8px;letter-spacing:2px;color:var(--text3);text-transform:uppercase;margin-bottom:3px;}
  .meta-val{font-size:13px;font-weight:600;}
  .meta-val.accent{color:var(--accent);}
  .meta-val.warn{color:var(--warn);}
  .meta-val.success{color:var(--success);}

  /* Section Cards */
  .section-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;}
  .card-title{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;display:flex;align-items:center;gap:8px;margin-bottom:16px;padding-bottom:11px;border-bottom:1px solid var(--border);}
  .card-title-badge{margin-left:auto;font-size:8px;padding:3px 7px;border-radius:4px;letter-spacing:1px;font-family:'DM Mono',monospace;}

  /* Measurements */
  .measurements-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:9px;}
  .measurement-card{background:var(--surface2);border-radius:9px;padding:12px;border:1px solid var(--border);position:relative;overflow:hidden;}
  .measurement-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
  .mc-normal::before{background:var(--success);}
  .mc-warn::before{background:var(--warn);}
  .mc-danger::before{background:var(--danger);}
  .mc-name{font-size:9px;letter-spacing:1.5px;color:var(--text3);text-transform:uppercase;margin-bottom:5px;}
  .mc-value{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;line-height:1;}
  .mc-unit{font-size:9px;color:var(--text2);margin-left:2px;}
  .mc-range{font-size:9px;color:var(--text3);margin-top:4px;}
  .mc-gauge{height:3px;background:var(--border);border-radius:2px;margin-top:6px;overflow:hidden;}
  .mc-gauge-fill{height:100%;border-radius:2px;transition:width 1.3s cubic-bezier(.2,.8,.3,1);}
  .mc-status{font-size:9px;font-weight:700;letter-spacing:1px;margin-top:3px;}
  .mc-status.normal{color:var(--success);}
  .mc-status.warn{color:var(--warn);}
  .mc-status.danger{color:var(--danger);}
  .mc-note{font-size:9px;color:var(--text3);margin-top:5px;border-top:1px solid var(--border);padding-top:4px;line-height:1.4;}

  /* Charts */
  .charts-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .chart-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px;}
  .chart-title{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:12px;}
  .chart-legend{display:flex;gap:12px;flex-wrap:wrap;margin-top:8px;}
  .legend-item{display:flex;align-items:center;gap:4px;font-size:9px;color:var(--text2);}
  .legend-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}

  /* Confidence */
  .conf-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;align-items:start;}
  .conf-bars{display:flex;flex-direction:column;gap:10px;}
  .conf-label-row{display:flex;justify-content:space-between;margin-bottom:4px;font-size:10px;}
  .conf-label-row span:first-child{color:var(--text2);}
  .conf-label-row span:last-child{color:var(--accent);font-weight:700;}
  .conf-track{height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
  .conf-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,#0080c8,var(--accent));transition:width 1.4s cubic-bezier(.2,.8,.3,1);}

  /* Reasoning Chain */
  .reasoning-chain{display:flex;flex-direction:column;gap:0;}
  .reasoning-step{display:flex;gap:13px;position:relative;padding-bottom:15px;}
  .reasoning-step:last-child{padding-bottom:0;}
  .reasoning-step:not(:last-child)::before{content:'';position:absolute;left:13px;top:27px;bottom:0;width:1px;background:linear-gradient(180deg,var(--border2),var(--border));}
  .step-node{width:26px;height:26px;border-radius:50%;flex-shrink:0;border:1.5px solid var(--accent);background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--accent);}
  .step-body{flex:1;}
  .step-title{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;color:var(--text);margin-bottom:3px;}
  .step-detail{font-size:10px;color:var(--text2);line-height:1.6;}
  .step-metric{display:inline-flex;align-items:center;gap:5px;margin-top:5px;font-size:9px;color:var(--accent);background:rgba(0,212,255,0.07);border:1px solid rgba(0,212,255,0.2);border-radius:4px;padding:3px 7px;font-family:'DM Mono',monospace;}
  .step-conf{font-size:9px;color:var(--text3);margin-top:3px;}

  /* Findings */
  .findings-list{display:flex;flex-direction:column;gap:9px;}
  .finding-item{display:flex;gap:11px;padding:12px;border:1px solid var(--border);border-radius:9px;background:var(--surface2);align-items:flex-start;}
  .finding-indicator{width:3px;min-height:34px;border-radius:2px;flex-shrink:0;}
  .fi-normal{background:var(--success);}
  .fi-mild{background:var(--warn);}
  .fi-moderate{background:var(--accent3);}
  .fi-severe{background:var(--danger);}
  .finding-name{font-size:12px;font-weight:600;margin-bottom:3px;}
  .finding-desc{font-size:10px;color:var(--text2);line-height:1.55;}
  .finding-tags{display:flex;gap:5px;margin-top:5px;flex-wrap:wrap;}
  .ftag{font-size:8px;letter-spacing:1px;padding:2px 6px;border-radius:3px;font-family:'DM Mono',monospace;}
  .ftag-region{background:rgba(0,212,255,0.07);color:var(--accent);border:1px solid rgba(0,212,255,0.2);}
  .ftag-size{background:rgba(167,139,250,0.07);color:var(--purple);border:1px solid rgba(167,139,250,0.2);}
  .ftag-density{background:rgba(255,171,0,0.07);color:var(--warn);border:1px solid rgba(255,171,0,0.2);}

  /* Advice */
  .advice-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
  .advice-item{background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:12px;}
  .advice-item-title{font-size:9px;font-weight:600;color:var(--accent);letter-spacing:1px;text-transform:uppercase;margin-bottom:7px;display:flex;align-items:center;gap:5px;}
  .advice-item ul{list-style:none;display:flex;flex-direction:column;gap:4px;}
  .advice-item li{font-size:10px;color:var(--text2);line-height:1.5;padding-left:11px;position:relative;}
  .advice-item li::before{content:'›';position:absolute;left:0;color:var(--accent);}

  /* Patient banner */
  .patient-banner{background:linear-gradient(135deg,rgba(0,255,157,0.04),rgba(0,212,255,0.04));border:1px solid rgba(0,255,157,0.2);border-radius:10px;padding:15px;display:flex;gap:13px;margin-bottom:13px;}
  .patient-banner-icon{font-size:24px;flex-shrink:0;}
  .patient-banner-title{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:var(--accent2);margin-bottom:5px;}
  .patient-banner p{font-size:10px;color:var(--text2);line-height:1.65;}

  /* Referral */
  .referral-alert{background:rgba(255,107,53,0.07);border:1px solid rgba(255,107,53,0.4);border-radius:9px;padding:15px;margin-bottom:13px;}
  .referral-alert-title{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--accent3);margin-bottom:4px;display:flex;align-items:center;gap:6px;}
  .referral-alert p{font-size:10px;color:var(--text2);line-height:1.6;}
  .specialties-list{display:flex;flex-wrap:wrap;gap:7px;}
  .specialty-tag{padding:5px 11px;border-radius:6px;border:1px solid var(--border2);background:var(--surface2);font-size:10px;display:flex;align-items:center;gap:5px;}

  /* Doctors */
  .doctors-list{display:flex;flex-direction:column;gap:9px;}
  .doctor-card{background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:13px;display:flex;align-items:center;gap:13px;transition:all 0.2s;}
  .doctor-card:hover{border-color:var(--border2);box-shadow:var(--glow);}
  .doctor-avatar{width:38px;height:38px;border-radius:8px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
  .doctor-info{flex:1;}
  .doctor-name{font-family:'Syne',sans-serif;font-size:13px;font-weight:600;margin-bottom:2px;}
  .doctor-specialty{font-size:9px;color:var(--accent);}
  .doctor-location{font-size:9px;color:var(--text3);}
  .doctor-rating{font-size:11px;color:var(--warn);}
  .doctor-link{font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--accent);text-decoration:none;border:1px solid var(--border2);padding:5px 9px;border-radius:5px;transition:all 0.2s;white-space:nowrap;}
  .doctor-link:hover{border-color:var(--accent);background:rgba(0,212,255,0.1);}

  /* Disclaimer */
  .disclaimer{background:rgba(255,171,0,0.05);border:1px solid rgba(255,171,0,0.25);border-radius:9px;padding:11px 15px;font-size:10px;color:var(--warn);line-height:1.6;display:flex;gap:8px;}

  /* Toast */
  .toast{position:fixed;bottom:20px;right:20px;background:var(--surface2);border:1px solid var(--border2);border-radius:9px;padding:11px 16px;font-size:11px;box-shadow:0 8px 32px rgba(0,0,0,0.5);z-index:1000;max-width:300px;animation:slideIn 0.3s ease;}
  @keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
  @keyframes spin2{to{transform:rotate(360deg)}}

  @media(max-width:900px){
    .main{flex-direction:column;}
    .left-panel{width:100%;min-width:0;}
    .charts-row{grid-template-columns:1fr;}
    .advice-grid{grid-template-columns:1fr;}
    .conf-grid{grid-template-columns:1fr;}
  }
</style>
</head>
<body>
<canvas id="three-canvas"></canvas>
<div id="root"></div>

<script>
(function(){
  const canvas=document.getElementById('three-canvas');
  const renderer=new THREE.WebGLRenderer({canvas,alpha:true,antialias:true});
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setSize(window.innerWidth,window.innerHeight);
  const scene=new THREE.Scene();
  const camera=new THREE.PerspectiveCamera(60,window.innerWidth/window.innerHeight,0.1,1000);
  camera.position.z=30;
  const geo=new THREE.BufferGeometry();
  const pts=[];
  for(let i=0;i<400;i++){const t=i*0.15;pts.push(Math.sin(t)*8,t*0.3-20,Math.cos(t)*8,Math.sin(t+Math.PI)*8,t*0.3-20,Math.cos(t+Math.PI)*8);}
  geo.setAttribute('position',new THREE.Float32BufferAttribute(pts,3));
  const helix=new THREE.Points(geo,new THREE.PointsMaterial({color:0x00d4ff,size:0.12,transparent:true,opacity:0.5}));
  scene.add(helix);
  scene.add(Object.assign(new THREE.GridHelper(80,20,0x0e3040,0x071419),{position:{y:-15,x:0,z:0}}));
  let t=0;
  (function animate(){requestAnimationFrame(animate);t+=0.004;helix.rotation.y=t*0.3;helix.position.y=Math.sin(t*0.5)*2;renderer.render(scene,camera);})();
  window.addEventListener('resize',()=>{camera.aspect=window.innerWidth/window.innerHeight;camera.updateProjectionMatrix();renderer.setSize(window.innerWidth,window.innerHeight);});
})();
</script>

<script type="text/babel">
const { useState, useRef, useEffect } = React;

const SCAN_TYPES=[{id:'xray',label:'X-Ray',icon:'🫁'},{id:'mri',label:'MRI',icon:'🧠'},{id:'ct',label:'CT Scan',icon:'⚕️'}];
const SPECIALTIES_MAP={xray:['Pulmonologist','Radiologist','Cardiologist','Orthopedic Surgeon'],mri:['Neurologist','Neurosurgeon','Radiologist','Orthopedic Surgeon'],ct:['Hepatologist','Gastroenterologist','Oncologist','Radiologist']};

// Global chart registry
const CHARTS={};
const destroyChart=id=>{if(CHARTS[id]){CHARTS[id].destroy();delete CHARTS[id];}};

// ── Measurements Panel ────────────────────────────────────────────────────────
function MeasurementPanel({measurements}){
  const [filled,setFilled]=useState(false);
  useEffect(()=>{const t=setTimeout(()=>setFilled(true),150);return()=>clearTimeout(t);},[]);
  if(!measurements?.length)return null;
  const cls=s=>{const v=(s||'').toLowerCase();return v==='normal'?'mc-normal':v==='critical'||v==='high'||v==='low'?'mc-danger':'mc-warn';};
  const scls=s=>{const v=(s||'').toLowerCase();return v==='normal'?'normal':v==='critical'||v==='high'||v==='low'?'danger':'warn';};
  const pct=(val,mn,mx)=>{if(val==null||mn==null||mx==null)return 50;const r=mx-mn;return r===0?50:Math.min(100,Math.max(0,((val-mn)/r)*100));};
  const gcol=s=>{const v=(s||'').toLowerCase();return v==='normal'?'var(--success)':v==='critical'||v==='high'||v==='low'?'var(--danger)':'var(--warn)';};
  return(
    <div className="measurements-grid">
      {measurements.map((m,i)=>{
        const p=pct(m.value,m.normal_min,m.normal_max);
        const displayVal=m.value!=null?(typeof m.value==='number'?m.value.toFixed(m.value<10?2:1):m.value):'—';
        return(
          <div key={i} className={`measurement-card ${cls(m.status)}`}>
            <div className="mc-name">{m.name}</div>
            <div className="mc-value">{displayVal}<span className="mc-unit">{m.unit}</span></div>
            <div className="mc-range">Ref: {m.normal_min??'—'} – {m.normal_max??'—'} {m.unit}</div>
            <div className="mc-gauge"><div className="mc-gauge-fill" style={{width:filled?`${p}%`:'0%',background:gcol(m.status)}}></div></div>
            <div className={`mc-status ${scls(m.status)}`}>{(m.status||'').toUpperCase()}</div>
            {m.significance&&<div className="mc-note">{m.significance}</div>}
          </div>
        );
      })}
    </div>
  );
}

// ── Chart Components ──────────────────────────────────────────────────────────
function BiomarkerChart({biomarkers}){
  const ref=useRef();
  useEffect(()=>{
    if(!ref.current||!biomarkers?.length)return;
    destroyChart('bio');
    const colors=biomarkers.map(b=>{const v=b.value,mx=b.normal_max;if(!mx)return'rgba(0,212,255,0.65)';if(v>mx*1.3)return'rgba(255,61,90,0.72)';if(v>mx)return'rgba(255,171,0,0.72)';return'rgba(0,212,255,0.62)';});
    CHARTS['bio']=new Chart(ref.current,{
      type:'bar',
      data:{labels:biomarkers.map(b=>b.name),datasets:[
        {label:'Patient Value',data:biomarkers.map(b=>b.value),backgroundColor:colors,borderColor:colors.map(c=>c.replace(/0\.\d+\)/,'1)')),borderWidth:1.5,borderRadius:4},
        {label:'Normal Max',data:biomarkers.map(b=>b.normal_max||null),type:'line',borderColor:'rgba(255,255,255,0.22)',borderDash:[5,4],borderWidth:1.5,pointRadius:3,pointBackgroundColor:'rgba(255,255,255,0.3)',fill:false,tension:0}
      ]},
      options:{responsive:true,maintainAspectRatio:true,
        plugins:{legend:{labels:{color:'#3d7a8e',font:{family:'DM Mono',size:10}}},tooltip:{bodyFont:{family:'DM Mono'},callbacks:{label:ctx=>` ${ctx.dataset.label}: ${ctx.parsed.y} ${biomarkers[ctx.dataIndex]?.unit||''}`}}},
        scales:{x:{grid:{color:'#0e3040'},ticks:{color:'#3d7a8e',font:{family:'DM Mono',size:10}}},y:{grid:{color:'#0e3040'},ticks:{color:'#3d7a8e',font:{family:'DM Mono',size:10}}}}}
    });
    return()=>destroyChart('bio');
  },[biomarkers]);
  return <canvas ref={ref} height={200}></canvas>;
}

function RadarChart({confidence}){
  const ref=useRef();
  useEffect(()=>{
    if(!ref.current||!confidence?.length)return;
    destroyChart('radar');
    CHARTS['radar']=new Chart(ref.current,{
      type:'radar',
      data:{labels:confidence.map(c=>c.label),datasets:[{label:'AI Confidence %',data:confidence.map(c=>c.score),backgroundColor:'rgba(0,212,255,0.1)',borderColor:'#00d4ff',borderWidth:2,pointBackgroundColor:'#00d4ff',pointRadius:4}]},
      options:{responsive:true,maintainAspectRatio:true,
        plugins:{legend:{labels:{color:'#3d7a8e',font:{family:'DM Mono',size:10}}}},
        scales:{r:{min:0,max:100,grid:{color:'#0e3040'},ticks:{color:'#3d7a8e',backdropColor:'transparent',font:{family:'DM Mono',size:9},stepSize:25},pointLabels:{color:'#7ab3c4',font:{family:'DM Mono',size:9}}}}}
    });
    return()=>destroyChart('radar');
  },[confidence]);
  return <canvas ref={ref} height={220}></canvas>;
}

function RangeChart({measurements}){
  const ref=useRef();
  const filtered=(measurements||[]).filter(m=>m.normal_max!=null&&m.value!=null);
  useEffect(()=>{
    if(!ref.current||!filtered.length)return;
    destroyChart('range');
    CHARTS['range']=new Chart(ref.current,{
      type:'bar',
      data:{labels:filtered.map(m=>m.name),datasets:[
        {label:'Patient',data:filtered.map(m=>m.value),backgroundColor:filtered.map(m=>{const s=(m.status||'').toLowerCase();return s==='critical'||s==='high'||s==='low'?'rgba(255,61,90,0.62)':s==='normal'?'rgba(0,255,157,0.52)':'rgba(255,171,0,0.62)';}),borderRadius:4,borderWidth:1.5,borderColor:filtered.map(m=>{const s=(m.status||'').toLowerCase();return s==='critical'||s==='high'||s==='low'?'#ff3d5a':s==='normal'?'#00ff9d':'#ffab00';})},
        {label:'Normal Max',data:filtered.map(m=>m.normal_max),backgroundColor:'rgba(255,255,255,0.05)',borderColor:'rgba(255,255,255,0.14)',borderWidth:1,borderRadius:4}
      ]},
      options:{responsive:true,maintainAspectRatio:true,indexAxis:'y',
        plugins:{legend:{labels:{color:'#3d7a8e',font:{family:'DM Mono',size:10}}}},
        scales:{x:{grid:{color:'#0e3040'},ticks:{color:'#3d7a8e',font:{family:'DM Mono',size:10}}},y:{grid:{color:'#0e3040'},ticks:{color:'#7ab3c4',font:{family:'DM Mono',size:10}}}}}
    });
    return()=>destroyChart('range');
  },[measurements]);
  if(!filtered.length)return null;
  return <canvas ref={ref} height={Math.max(180,filtered.length*40)}></canvas>;
}

// ── Confidence Bars ───────────────────────────────────────────────────────────
function ConfBars({confidence}){
  const [on,setOn]=useState(false);
  useEffect(()=>{const t=setTimeout(()=>setOn(true),120);return()=>clearTimeout(t);},[]);
  if(!confidence?.length)return null;
  return(
    <div className="conf-bars">
      {confidence.map((c,i)=>(
        <div key={i}>
          <div className="conf-label-row"><span>{c.label}</span><span>{c.score}%</span></div>
          <div className="conf-track"><div className="conf-fill" style={{width:on?`${c.score}%`:'0%'}}></div></div>
        </div>
      ))}
    </div>
  );
}

// ── Reasoning Chain ───────────────────────────────────────────────────────────
function ReasoningChain({steps}){
  if(!steps?.length)return null;
  return(
    <div className="reasoning-chain">
      {steps.map((s,i)=>(
        <div key={i} className="reasoning-step">
          <div className="step-node">{s.step||i+1}</div>
          <div className="step-body">
            <div className="step-title">{s.title}</div>
            <div className="step-detail">{s.detail}</div>
            {s.metric&&<div className="step-metric">📐 {s.metric}</div>}
            {s.confidence_contribution!=null&&<div className="step-conf">Contribution to confidence: {s.confidence_contribution}%</div>}
          </div>
        </div>
      ))}
    </div>
  );
}

// ── Severity badge ────────────────────────────────────────────────────────────
function SevBadge({level}){
  const m={low:'sev-low',medium:'sev-medium',high:'sev-high',critical:'sev-critical'};
  return <span className={`severity-badge ${m[level]||'sev-medium'}`}>{(level||'UNKNOWN').toUpperCase()}</span>;
}

// ── Main App ──────────────────────────────────────────────────────────────────
function App(){
  const [scanType,setScanType]=useState('ct');
  const [image,setImage]=useState(null);
  const [imageBase64,setImageBase64]=useState(null);
  const [imageMime,setImageMime]=useState('image/jpeg');
  const [loading,setLoading]=useState(false);
  const [loadStep,setLoadStep]=useState(0);
  const [report,setReport]=useState(null);
  const [toast,setToast]=useState(null);
  const [dragOver,setDragOver]=useState(false);
  const [patientInfo,setPatientInfo]=useState({name:'',age:'',gender:'',symptoms:''});
  const fileRef=useRef();

  const showToast=msg=>{setToast(msg);setTimeout(()=>setToast(null),4000);};

  const handleFile=file=>{
    if(!file)return;
    if(!file.type.startsWith('image/')){showToast('⚠️ Please upload an image file');return;}
    if(file.size>15*1024*1024){showToast('⚠️ File too large. Max 15 MB.');return;}
    setImageMime(file.type||'image/jpeg');
    const reader=new FileReader();
    reader.onload=e=>{setImage(e.target.result);setImageBase64(e.target.result.split(',')[1]);setReport(null);};
    reader.readAsDataURL(file);
  };

  const buildPrompt=()=>{
    const label=SCAN_TYPES.find(s=>s.id===scanType)?.label||scanType.toUpperCase();
    return `You are a board-certified radiologist and hepatologist AI. Analyze this ${label} image with full clinical rigor.

Patient: ${patientInfo.name||'Anonymous'} | Age: ${patientInfo.age||'Unknown'} | Gender: ${patientInfo.gender||'Unknown'}
Symptoms: ${patientInfo.symptoms||'None provided'}

RETURN ONLY VALID JSON — no markdown, no backticks. Exact schema:

{
  "title": "Primary diagnosis in clinical language",
  "icd_code": "ICD-10 code e.g. K76.0",
  "severity": "low|medium|high|critical",
  "overall_confidence": 0-100,
  "organ_assessed": "Liver|Lung|Brain|Kidney|Other",
  "scan_quality": "Good|Adequate|Poor",
  "lirads_score": "LR-1|LR-2|LR-3|LR-4|LR-5|LR-M|N/A",
  "fibrosis_stage": "F0|F1|F2|F3|F4|N/A",
  "steatosis_grade": "S0|S1|S2|S3|N/A",
  "modality_detail": "e.g. Contrast-enhanced CT, T2-FLAIR MRI, PA X-Ray",
  "ai_confidence_breakdown": [
    {"label": "Lesion Detection", "score": 0-100},
    {"label": "Tissue Classification", "score": 0-100},
    {"label": "Boundary Delineation", "score": 0-100},
    {"label": "Pathology Identification", "score": 0-100},
    {"label": "Staging Accuracy", "score": 0-100}
  ],
  "clinical_measurements": [
    {"name": "e.g. Liver Span", "value": numeric, "unit": "cm", "normal_min": numeric_or_null, "normal_max": numeric_or_null, "status": "Normal|Elevated|Low|Critical", "significance": "brief clinical note"}
  ],
  "biomarkers": [
    {"name": "ALT", "value": numeric, "unit": "U/L", "normal_max": 56},
    {"name": "AST", "value": numeric, "unit": "U/L", "normal_max": 40},
    {"name": "ALP", "value": numeric, "unit": "U/L", "normal_max": 147},
    {"name": "Total Bilirubin", "value": numeric, "unit": "mg/dL", "normal_max": 1.2},
    {"name": "Albumin", "value": numeric, "unit": "g/dL", "normal_min": 3.5, "normal_max": 5.5},
    {"name": "GGT", "value": numeric, "unit": "U/L", "normal_max": 55}
  ],
  "reasoning_chain": [
    {"step":1,"title":"Image Quality & Technical Assessment","detail":"detailed reasoning","metric":"specific observation or measurement","confidence_contribution":0-100},
    {"step":2,"title":"Organ Morphology & Size Analysis","detail":"...","metric":"dimensions in mm/cm","confidence_contribution":0-100},
    {"step":3,"title":"Density / Signal Intensity Evaluation","detail":"...","metric":"HU values or MRI signal patterns","confidence_contribution":0-100},
    {"step":4,"title":"Lesion & Abnormality Detection","detail":"...","metric":"lesion size, location, margins","confidence_contribution":0-100},
    {"step":5,"title":"Differential Diagnosis & Probability Weighting","detail":"...","metric":"top 3 differentials with probability %","confidence_contribution":0-100},
    {"step":6,"title":"Final Classification & Severity Grading","detail":"...","metric":"score and grading rationale","confidence_contribution":0-100}
  ],
  "findings": [
    {"name":"...","description":"detailed with measurements","severity":"normal|mild|moderate|severe","region":"anatomical location","size_mm":numeric_or_null,"density_hu":numeric_or_null}
  ],
  "patientSummary": "Plain English for patient — 2-3 sentences",
  "doctorAdvice": [
    {"title":"Immediate Actions","icon":"🚨","points":["action1","action2","action3"]},
    {"title":"Diagnostic Tests","icon":"🧪","points":["test1","test2","test3"]},
    {"title":"Treatment Options","icon":"💉","points":["option1","option2","option3"]},
    {"title":"Follow-up Protocol","icon":"📅","points":["protocol1","protocol2"]}
  ],
  "patientAdvice": [
    {"title":"Lifestyle Changes","icon":"🏃","points":["advice1","advice2","advice3"]},
    {"title":"Diet & Nutrition","icon":"🥗","points":["diet1","diet2","diet3"]},
    {"title":"Medications","icon":"💊","points":["med1","med2"]},
    {"title":"Warning Signs","icon":"⚠️","points":["sign1","sign2","sign3"]}
  ],
  "referralReason": "Reason or null"
}

Use realistic, medically plausible numeric values based on scan type and visible features. Include HU values for CT, signal patterns for MRI.`;
  };

  const analyze=async()=>{
    if(!imageBase64){showToast('📁 Upload a medical scan image first.');return;}
    setLoading(true);setReport(null);setLoadStep(0);
    const si=setInterval(()=>setLoadStep(s=>s<6?s+1:s),850);
    try{
      let text='';
      try{
        const res=await fetch('/api/analyze',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({imageBase64,imageMime,prompt:buildPrompt()})});
        if(res.ok){const d=await res.json();text=d.text||'';if(d.model)showToast(`✅ Analyzed with ${d.model}`);}
        else{const e=await res.json().catch(()=>({}));throw new Error(e.error||`HTTP ${res.status}`);}
      }catch(apiErr){console.warn('API fallback:',apiErr.message);showToast('⚠️ Demo mode — deploy to Vercel with GEMINI_API_KEY for live AI analysis');}
      let parsed;
      if(text){
        const clean=text.replace(/```json/g,'').replace(/```/g,'').trim();
        const m=clean.match(/\{[\s\S]*\}/);
        parsed=JSON.parse(m?m[0]:clean);
      }else{parsed=getDemoReport(scanType);}
      setLoadStep(6);
      await new Promise(r=>setTimeout(r,400));
      setReport(parsed);
    }catch(err){
      console.error(err);
      setReport(getDemoReport(scanType));
      showToast('⚠️ Demo report shown');
    }finally{clearInterval(si);setLoadStep(6);setLoading(false);}
  };

  return(
    <div className="app-shell">
      <header className="header">
        <div className="logo"><div className="logo-icon">⚕️</div><div className="logo-text">Medi<span>Scan</span> AI</div></div>
        <div className="header-badge">Clinical Diagnostic Platform · v3.1</div>
        <div className="header-right"><div className="status-dot"></div><div className="status-text">AI ONLINE</div></div>
      </header>
      <div className="main">

        {/* LEFT */}
        <div className="left-panel">
          <div className="panel-section">
            <div className="section-label">Scan Type</div>
            <div className="scan-types">
              {SCAN_TYPES.map(s=>(
                <button key={s.id} className={`scan-type-btn ${scanType===s.id?'active':''}`} onClick={()=>{setScanType(s.id);setReport(null);}}>
                  <div className="scan-type-icon">{s.icon}</div>
                  <div className="scan-type-label">{s.label}</div>
                </button>
              ))}
            </div>
          </div>
          <div className="panel-section">
            <div className="section-label">Medical Image</div>
            <div className={`upload-zone ${dragOver?'drag-over':''}`} onClick={()=>fileRef.current?.click()} onDragOver={e=>{e.preventDefault();setDragOver(true);}} onDragLeave={()=>setDragOver(false)} onDrop={e=>{e.preventDefault();setDragOver(false);handleFile(e.dataTransfer.files[0]);}}>
              <div className="upload-icon">{image?'✅':'🏥'}</div>
              <div className="upload-title">{image?'Image loaded — ready to analyze':'Drop your scan here'}</div>
              <div className="upload-sub">Click or drag & drop · JPG, PNG, WEBP</div>
            </div>
            <input ref={fileRef} type="file" accept="image/*" onChange={e=>handleFile(e.target.files[0])}/>
            {image&&(
              <div className="preview-area">
                <img src={image} alt="Scan preview"/>
                <div className="preview-overlay">{SCAN_TYPES.find(s=>s.id===scanType)?.label}</div>
                <button className="preview-remove" onClick={()=>{setImage(null);setImageBase64(null);setReport(null);}}>✕ Remove</button>
              </div>
            )}
          </div>
          <div className="panel-section">
            <div className="section-label">Patient Information</div>
            <div className="form-row"><label className="form-label">Patient Name</label><input className="form-input" placeholder="Full name" value={patientInfo.name} onChange={e=>setPatientInfo({...patientInfo,name:e.target.value})}/></div>
            <div className="form-row form-row-2">
              <div><label className="form-label">Age</label><input className="form-input" type="number" placeholder="Years" value={patientInfo.age} onChange={e=>setPatientInfo({...patientInfo,age:e.target.value})}/></div>
              <div><label className="form-label">Gender</label><select className="form-select" value={patientInfo.gender} onChange={e=>setPatientInfo({...patientInfo,gender:e.target.value})}><option value="">Select</option><option value="Male">Male</option><option value="Female">Female</option><option value="Other">Other</option></select></div>
            </div>
            <div className="form-row"><label className="form-label">Symptoms / Clinical Notes</label><textarea className="form-input" rows={3} placeholder="Symptoms, history, reason for scan..." value={patientInfo.symptoms} onChange={e=>setPatientInfo({...patientInfo,symptoms:e.target.value})} style={{resize:'vertical'}}/></div>
          </div>
          <div className="panel-section">
            <button className="analyze-btn" onClick={analyze} disabled={loading||!image}>
              {loading?<><span style={{animation:'spin2 1s linear infinite',display:'inline-block'}}>⚙️</span> Analyzing...</>:<>🔬 Analyze Scan</>}
            </button>
            <div style={{marginTop:10,fontSize:9,color:'var(--text3)',textAlign:'center',lineHeight:1.7}}>Uses GEMINI_API_KEY from Vercel environment.<br/>Falls back to detailed demo report if API unavailable.</div>
          </div>
        </div>

        {/* RIGHT */}
        <div className="right-panel">
          {loading?(
            <LoadingScreen step={loadStep}/>
          ):report?(
            <ReportView report={report} scanType={scanType} patientInfo={patientInfo} image={image}/>
          ):(
            <div className="welcome-screen">
              <div className="welcome-glyph">🔬</div>
              <div className="welcome-title">AI Clinical Diagnostic Platform</div>
              <div className="welcome-sub">Upload an X-Ray, MRI, or CT scan to generate a full doctor-grade report with precise measurements, biomarker charts, AI reasoning chain, and clinical recommendations.</div>
              <div className="feature-grid">
                {[['📐','Precise Measurements','HU density, organ dimensions & biomarkers vs normal range'],['📊','3 Clinical Charts','Biomarker bar, confidence radar & measurement vs range charts'],['🧠','AI Reasoning Chain','Step-by-step how the AI reached every conclusion'],['🔍','Findings with Data','Size in mm, density in HU, location, severity per finding'],['👨‍⚕️','Doctor Protocol','Clinical tests, treatment & follow-up recommendations'],['🌟','Find Specialists','Verified doctors with direct appointment booking']].map(([icon,title,desc],i)=>(
                  <div key={i} className="feature-card">
                    <div className="feature-card-icon">{icon}</div>
                    <div className="feature-card-title">{title}</div>
                    <div className="feature-card-desc">{desc}</div>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      </div>
      {toast&&<div className="toast">{toast}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
