<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MediScan AI — Intelligent Medical Imaging Analysis</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚕️</text></svg>"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  :root {
    --bg: #030a0e;
    --surface: #071419;
    --surface2: #0c1f27;
    --border: #0e3040;
    --border2: #1a4a5e;
    --accent: #00d4ff;
    --accent2: #00ff9d;
    --accent3: #ff6b35;
    --text: #e8f4f8;
    --text2: #7ab3c4;
    --text3: #3d7a8e;
    --danger: #ff3d5a;
    --warn: #ffab00;
    --success: #00ff9d;
    --glow: 0 0 30px rgba(0,212,255,0.15);
    --glow2: 0 0 60px rgba(0,212,255,0.08);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; overflow-x: hidden; }
  #root { min-height: 100vh; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  /* Canvas bg */
  #three-canvas {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    z-index: 0; pointer-events: none; opacity: 0.4;
  }

  .app-shell {
    position: relative; z-index: 1; min-height: 100vh;
    display: flex; flex-direction: column;
  }

  /* HEADER */
  .header {
    padding: 20px 40px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(20px);
    background: rgba(3,10,14,0.7);
    position: sticky; top: 0; z-index: 100;
  }
  .logo {
    display: flex; align-items: center; gap: 12px;
  }
  .logo-icon {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; box-shadow: var(--glow);
  }
  .logo-text {
    font-family: 'Syne', sans-serif;
    font-weight: 800; font-size: 20px;
    letter-spacing: -0.5px;
  }
  .logo-text span { color: var(--accent); }
  .header-badge {
    font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--accent2); border: 1px solid var(--accent2);
    padding: 4px 10px; border-radius: 20px;
    box-shadow: 0 0 15px rgba(0,255,157,0.1);
  }
  .header-right { display: flex; align-items: center; gap: 16px; }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent2);
    box-shadow: 0 0 10px var(--accent2);
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .status-text { font-size: 11px; color: var(--text2); letter-spacing: 1px; }

  /* MAIN LAYOUT */
  .main { display: flex; flex: 1; min-height: calc(100vh - 65px); }

  /* LEFT PANEL */
  .left-panel {
    width: 420px; min-width: 420px;
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    background: rgba(7,20,25,0.6);
    backdrop-filter: blur(10px);
  }

  .panel-section {
    padding: 28px;
    border-bottom: 1px solid var(--border);
  }
  .section-label {
    font-size: 10px; letter-spacing: 3px; text-transform: uppercase;
    color: var(--text3); margin-bottom: 16px;
    display: flex; align-items: center; gap: 8px;
  }
  .section-label::after {
    content:''; flex:1; height:1px; background: var(--border);
  }

  /* Upload Zone */
  .upload-zone {
    border: 1.5px dashed var(--border2);
    border-radius: 12px;
    padding: 40px 24px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
    background: rgba(0,212,255,0.02);
  }
  .upload-zone::before {
    content:''; position:absolute; inset:0;
    background: radial-gradient(ellipse at 50% 100%, rgba(0,212,255,0.05) 0%, transparent 70%);
    pointer-events:none;
  }
  .upload-zone:hover, .upload-zone.drag-over {
    border-color: var(--accent);
    background: rgba(0,212,255,0.05);
    box-shadow: var(--glow);
  }
  .upload-icon { font-size: 36px; margin-bottom: 12px; }
  .upload-title {
    font-family: 'Syne', sans-serif;
    font-size: 15px; font-weight: 600;
    color: var(--text); margin-bottom: 6px;
  }
  .upload-sub { font-size: 11px; color: var(--text3); line-height: 1.6; }
  .upload-types {
    display: flex; gap: 6px; justify-content: center; margin-top: 14px; flex-wrap: wrap;
  }
  .type-tag {
    font-size: 9px; letter-spacing: 1.5px; padding: 3px 8px;
    border: 1px solid var(--border2); border-radius: 4px;
    color: var(--text2); text-transform: uppercase;
  }
  input[type=file] { display:none; }

  /* Preview */
  .preview-area {
    margin-top: 16px; border-radius: 10px; overflow: hidden;
    position: relative; background: #000;
    border: 1px solid var(--border);
  }
  .preview-area img {
    width: 100%; display: block; max-height: 220px;
    object-fit: contain; background: #000;
  }
  .preview-overlay {
    position: absolute; top: 8px; right: 8px;
    background: rgba(0,0,0,0.7); border: 1px solid var(--border2);
    border-radius: 6px; padding: 4px 8px;
    font-size: 9px; letter-spacing: 1px; color: var(--accent);
  }
  .preview-remove {
    position: absolute; top: 8px; left: 8px;
    background: rgba(255,61,90,0.2); border: 1px solid var(--danger);
    border-radius: 6px; padding: 4px 8px; cursor: pointer;
    font-size: 9px; color: var(--danger); letter-spacing: 1px;
    transition: all 0.2s;
  }
  .preview-remove:hover { background: rgba(255,61,90,0.4); }

  /* Scan Type Selector */
  .scan-types { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .scan-type-btn {
    padding: 12px 8px; border-radius: 8px; cursor: pointer;
    border: 1px solid var(--border);
    background: transparent;
    text-align: center; transition: all 0.2s;
    color: var(--text2); font-family: 'DM Mono', monospace;
  }
  .scan-type-btn:hover { border-color: var(--border2); color: var(--text); }
  .scan-type-btn.active {
    border-color: var(--accent); background: rgba(0,212,255,0.08);
    color: var(--accent); box-shadow: 0 0 15px rgba(0,212,255,0.1);
  }
  .scan-type-icon { font-size: 20px; margin-bottom: 6px; }
  .scan-type-label { font-size: 10px; letter-spacing: 1px; text-transform: uppercase; }

  /* Patient Info */
  .form-row { margin-bottom: 14px; }
  .form-label { font-size: 10px; letter-spacing: 2px; color: var(--text3); margin-bottom: 6px; display: block; text-transform: uppercase; }
  .form-input, .form-select {
    width: 100%; background: var(--surface2);
    border: 1px solid var(--border); border-radius: 8px;
    padding: 10px 14px; color: var(--text);
    font-family: 'DM Mono', monospace; font-size: 13px;
    transition: border-color 0.2s; outline: none;
  }
  .form-input:focus, .form-select:focus { border-color: var(--accent); }
  .form-select option { background: var(--surface2); }
  .form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  /* Analyze Button */
  .analyze-btn {
    width: 100%; padding: 16px;
    background: linear-gradient(135deg, var(--accent), #0080ff);
    border: none; border-radius: 10px; cursor: pointer;
    font-family: 'Syne', sans-serif; font-weight: 700;
    font-size: 14px; letter-spacing: 1px; color: #000;
    text-transform: uppercase;
    transition: all 0.3s; position: relative; overflow: hidden;
    box-shadow: 0 0 30px rgba(0,212,255,0.3);
    display: flex; align-items: center; justify-content: center; gap: 10px;
  }
  .analyze-btn:hover { transform: translateY(-2px); box-shadow: 0 0 50px rgba(0,212,255,0.5); }
  .analyze-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .analyze-btn::before {
    content:''; position:absolute; top:-50%; left:-60%;
    width:40%; height:200%;
    background: rgba(255,255,255,0.15);
    transform: skewX(-20deg);
    transition: left 0.5s;
  }
  .analyze-btn:hover::before { left:120%; }

  /* RIGHT PANEL */
  .right-panel {
    flex: 1; display: flex; flex-direction: column;
    overflow: hidden;
  }

  /* Welcome Screen */
  .welcome-screen {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 60px;
    text-align: center;
  }
  .welcome-glyph {
    width: 120px; height: 120px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(0,212,255,0.15), transparent 70%);
    border: 1px solid var(--border2);
    display: flex; align-items: center; justify-content: center;
    font-size: 52px; margin: 0 auto 32px;
    animation: float 4s ease-in-out infinite;
    box-shadow: var(--glow), var(--glow2);
  }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
  .welcome-title {
    font-family: 'Syne', sans-serif; font-size: 32px; font-weight: 800;
    letter-spacing: -1px; margin-bottom: 12px;
    background: linear-gradient(135deg, var(--text), var(--accent));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .welcome-sub {
    font-family: 'Instrument Serif', serif; font-style: italic;
    font-size: 16px; color: var(--text2); max-width: 420px;
    line-height: 1.7; margin-bottom: 40px;
  }
  .feature-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; max-width: 600px; }
  .feature-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px; padding: 20px;
    text-align: left; transition: all 0.3s;
  }
  .feature-card:hover { border-color: var(--border2); box-shadow: var(--glow); }
  .feature-card-icon { font-size: 24px; margin-bottom: 10px; }
  .feature-card-title { font-family:'Syne',sans-serif; font-size:13px; font-weight:600; margin-bottom:6px; }
  .feature-card-desc { font-size:11px; color:var(--text3); line-height:1.5; }

  /* Analysis Results */
  .results-container {
    flex: 1; overflow-y: auto; padding: 32px;
    display: flex; flex-direction: column; gap: 24px;
  }

  /* Loading */
  .loading-screen {
    flex:1; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:24px;
  }
  .scanner-ring {
    width: 100px; height: 100px; position: relative;
  }
  .scanner-ring::before, .scanner-ring::after {
    content:''; position:absolute; border-radius:50%; border:2px solid transparent;
  }
  .scanner-ring::before {
    inset:0; border-top-color: var(--accent);
    animation: spin 1s linear infinite;
  }
  .scanner-ring::after {
    inset:10px; border-top-color: var(--accent2);
    animation: spin 0.7s linear infinite reverse;
  }
  @keyframes spin { to{transform:rotate(360deg)} }
  .loading-icon {
    position:absolute; top:50%; left:50%;
    transform:translate(-50%,-50%); font-size:28px;
  }
  .loading-text { font-family:'Syne',sans-serif; font-size:18px; font-weight:700; color:var(--accent); }
  .loading-sub { font-size:12px; color:var(--text2); letter-spacing:2px; text-transform:uppercase; }
  .loading-steps { display:flex; flex-direction:column; gap:8px; margin-top:8px; }
  .loading-step {
    font-size:11px; color:var(--text3); display:flex; align-items:center; gap:10px;
    transition: color 0.3s;
  }
  .loading-step.active { color:var(--accent2); }
  .loading-step.done { color:var(--text2); }
  .step-dot {
    width:6px; height:6px; border-radius:50%;
    background:var(--text3); flex-shrink:0; transition:background 0.3s;
  }
  .loading-step.active .step-dot { background:var(--accent2); box-shadow:0 0 8px var(--accent2); }
  .loading-step.done .step-dot { background:var(--accent2); }

  /* Report Cards */
  .report-header {
    background: linear-gradient(135deg, var(--surface), var(--surface2));
    border: 1px solid var(--border2);
    border-radius: 14px; padding: 24px;
    display: flex; align-items: flex-start; justify-content: space-between;
    gap: 20px;
    box-shadow: var(--glow);
  }
  .report-title-area {}
  .report-tag {
    font-size: 9px; letter-spacing: 3px; text-transform: uppercase;
    color: var(--accent); margin-bottom: 8px; display: block;
  }
  .report-main-title {
    font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 800;
    letter-spacing: -0.5px; margin-bottom: 4px;
  }
  .report-meta { font-size: 11px; color: var(--text2); }
  .severity-badge {
    flex-shrink: 0; padding: 10px 18px;
    border-radius: 30px; font-family:'Syne',sans-serif;
    font-weight:700; font-size:13px; letter-spacing:1px;
    text-transform: uppercase;
  }
  .sev-low { background: rgba(0,255,157,0.15); color:var(--success); border:1px solid var(--success); }
  .sev-medium { background: rgba(255,171,0,0.15); color:var(--warn); border:1px solid var(--warn); }
  .sev-high { background: rgba(255,61,90,0.15); color:var(--danger); border:1px solid var(--danger); }
  .sev-critical { background: rgba(255,61,90,0.3); color:var(--danger); border:1px solid var(--danger); box-shadow:0 0 20px rgba(255,61,90,0.3); }

  .findings-card, .advice-card, .referral-card, .doctors-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px; padding: 24px;
  }
  .card-title {
    font-family:'Syne',sans-serif; font-size:14px; font-weight:700;
    letter-spacing:1px; text-transform:uppercase;
    display:flex; align-items:center; gap:10px; margin-bottom:20px;
    padding-bottom: 14px; border-bottom: 1px solid var(--border);
  }
  .card-title-icon { font-size:18px; }
  .card-title-text { color:var(--text); }
  .card-title-badge {
    margin-left:auto; font-size:9px; padding:3px 8px;
    border-radius:4px; letter-spacing:1px;
  }

  /* Findings List */
  .findings-list { display:flex; flex-direction:column; gap:12px; }
  .finding-item {
    display:flex; gap:14px; padding:14px;
    border:1px solid var(--border); border-radius:10px;
    background: var(--surface2); align-items:flex-start;
  }
  .finding-indicator {
    width: 4px; min-height: 40px; border-radius: 2px; flex-shrink:0;
  }
  .fi-normal { background: var(--success); }
  .fi-mild { background: var(--warn); }
  .fi-moderate { background: var(--accent3); }
  .fi-severe { background: var(--danger); }
  .finding-content {}
  .finding-name { font-size:13px; font-weight:500; margin-bottom:4px; }
  .finding-desc { font-size:11px; color:var(--text2); line-height:1.6; }
  .finding-region { font-size:10px; color:var(--text3); margin-top:4px; letter-spacing:1px; }

  /* Vitals Grid */
  .vitals-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }
  .vital-card {
    background:var(--surface2); border:1px solid var(--border);
    border-radius:10px; padding:14px; text-align:center;
  }
  .vital-label { font-size:9px; letter-spacing:2px; color:var(--text3); text-transform:uppercase; margin-bottom:6px; }
  .vital-value { font-family:'Syne',sans-serif; font-size:22px; font-weight:800; }
  .vital-unit { font-size:10px; color:var(--text2); margin-top:2px; }

  /* Advice Section */
  .advice-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .advice-item {
    background:var(--surface2); border:1px solid var(--border);
    border-radius:10px; padding:14px;
  }
  .advice-item-title {
    font-size:11px; font-weight:500; color:var(--accent);
    letter-spacing:1px; text-transform:uppercase; margin-bottom:8px;
    display:flex; align-items:center; gap:6px;
  }
  .advice-item ul { list-style:none; display:flex; flex-direction:column; gap:5px; }
  .advice-item li { font-size:11px; color:var(--text2); line-height:1.5; padding-left:14px; position:relative; }
  .advice-item li::before { content:'›'; position:absolute; left:0; color:var(--accent); }

  /* Patient Advice Banner */
  .patient-banner {
    background: linear-gradient(135deg, rgba(0,255,157,0.05), rgba(0,212,255,0.05));
    border: 1px solid var(--accent2);
    border-radius: 12px; padding: 20px;
    display: flex; gap: 16px;
  }
  .patient-banner-icon { font-size:28px; flex-shrink:0; }
  .patient-banner-content {}
  .patient-banner-title { font-family:'Syne',sans-serif; font-size:14px; font-weight:700; color:var(--accent2); margin-bottom:8px; }
  .patient-banner p { font-size:12px; color:var(--text2); line-height:1.7; }

  /* Referral Card */
  .referral-alert {
    background: rgba(255,107,53,0.08);
    border: 1px solid var(--accent3);
    border-radius: 12px; padding: 20px;
    margin-bottom: 16px;
  }
  .referral-alert-title { font-family:'Syne',sans-serif; font-size:15px; font-weight:700; color:var(--accent3); margin-bottom:6px; display:flex; align-items:center; gap:8px; }
  .referral-alert p { font-size:12px; color:var(--text2); line-height:1.6; }
  .specialties-list { display:flex; flex-wrap:wrap; gap:8px; }
  .specialty-tag {
    padding:8px 14px; border-radius:8px;
    border:1px solid var(--border2); background:var(--surface2);
    font-size:11px; color:var(--text);
    display:flex; align-items:center; gap:6px;
  }

  /* Doctors List */
  .doctors-list { display:flex; flex-direction:column; gap:12px; }
  .doctor-card {
    background:var(--surface2); border:1px solid var(--border);
    border-radius:10px; padding:16px;
    display:flex; align-items:center; gap:16px;
    transition:all 0.2s;
  }
  .doctor-card:hover { border-color:var(--border2); box-shadow:var(--glow); }
  .doctor-avatar {
    width:44px; height:44px; border-radius:10px;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    display:flex; align-items:center; justify-content:center;
    font-size:18px; flex-shrink:0;
  }
  .doctor-info { flex:1; }
  .doctor-name { font-family:'Syne',sans-serif; font-size:14px; font-weight:600; margin-bottom:2px; }
  .doctor-specialty { font-size:11px; color:var(--accent); margin-bottom:2px; }
  .doctor-location { font-size:11px; color:var(--text3); }
  .doctor-rating { font-size:12px; color:var(--warn); }
  .doctor-link {
    font-size:10px; letter-spacing:1px; text-transform:uppercase;
    color:var(--accent); text-decoration:none; border:1px solid var(--border2);
    padding:6px 12px; border-radius:6px; transition:all 0.2s; white-space:nowrap;
  }
  .doctor-link:hover { border-color:var(--accent); background:rgba(0,212,255,0.1); }

  /* Disclaimer */
  .disclaimer {
    background:rgba(255,171,0,0.06); border:1px solid rgba(255,171,0,0.3);
    border-radius:10px; padding:14px 18px;
    font-size:11px; color:var(--warn); line-height:1.6;
    display:flex; gap:10px; align-items:flex-start;
  }

  /* Toast */
  .toast {
    position:fixed; bottom:24px; right:24px;
    background:var(--surface2); border:1px solid var(--border2);
    border-radius:10px; padding:14px 20px;
    font-size:12px; color:var(--text);
    box-shadow:0 8px 32px rgba(0,0,0,0.5);
    z-index:1000; animation:slideIn 0.3s ease;
    max-width:320px;
  }
  @keyframes slideIn { from{transform:translateX(100%);opacity:0} to{transform:translateX(0);opacity:1} }

  /* Responsive */
  @media(max-width:900px) {
    .main { flex-direction:column; }
    .left-panel { width:100%; min-width:0; }
    .header { padding:16px 20px; }
    .feature-grid { grid-template-columns:1fr 1fr; }
    .advice-grid { grid-template-columns:1fr; }
    .vitals-grid { grid-template-columns:1fr 1fr; }
  }
</style>
</head>
<body>
<canvas id="three-canvas"></canvas>
<div id="root"></div>

<script>
// Three.js Background
(function() {
  const canvas = document.getElementById('three-canvas');
  const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setSize(window.innerWidth, window.innerHeight);

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
  camera.position.z = 30;

  // DNA Helix / molecular structure
  const geometry = new THREE.BufferGeometry();
  const pts = [];
  for(let i=0; i<400; i++) {
    const t = i * 0.15;
    pts.push(Math.sin(t)*8, t*0.3 - 20, Math.cos(t)*8);
    pts.push(Math.sin(t+Math.PI)*8, t*0.3 - 20, Math.cos(t+Math.PI)*8);
  }
  geometry.setAttribute('position', new THREE.Float32BufferAttribute(pts, 3));
  const mat = new THREE.PointsMaterial({ color:0x00d4ff, size:0.15, transparent:true, opacity:0.6 });
  const helix = new THREE.Points(geometry, mat);
  scene.add(helix);

  // Grid
  const gridHelper = new THREE.GridHelper(80, 20, 0x0e3040, 0x071419);
  gridHelper.position.y = -15;
  scene.add(gridHelper);

  // Floating orbs
  const orbGeo = new THREE.SphereGeometry(0.3, 8, 8);
  const orbs = [];
  for(let i=0; i<20; i++) {
    const m = new THREE.MeshBasicMaterial({ color: i%2===0 ? 0x00d4ff : 0x00ff9d, transparent:true, opacity:0.4 });
    const mesh = new THREE.Mesh(orbGeo, m);
    mesh.position.set((Math.random()-0.5)*40, (Math.random()-0.5)*20, (Math.random()-0.5)*20);
    mesh.userData = { speed: Math.random()*0.01+0.005, phase: Math.random()*Math.PI*2 };
    scene.add(mesh);
    orbs.push(mesh);
  }

  let t=0;
  function animate() {
    requestAnimationFrame(animate);
    t += 0.005;
    helix.rotation.y = t * 0.3;
    helix.position.y = Math.sin(t*0.5)*2;
    orbs.forEach(o => { o.position.y += Math.sin(t + o.userData.phase) * o.userData.speed; });
    renderer.render(scene, camera);
  }
  animate();

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
})();
</script>

          <div className="status-dot"></div>
          <div className="status-text">AI ONLINE</div>
        </div>
      </header>

      <div className="main">
        {/* Left Panel */}
        <div className="left-panel">

          {/* Scan Type */}
          <div className="panel-section">
            <div className="section-label">Scan Type</div>
            <div className="scan-types">
              {SCAN_TYPES.map(s => (
                <button
                  key={s.id}
                  className={`scan-type-btn ${scanType===s.id?'active':''}`}
                  onClick={() => { setScanType(s.id); setReport(null); }}
                >
                  <div className="scan-type-icon">{s.icon}</div>
                  <div className="scan-type-label">{s.label}</div>
                </button>
              ))}
            </div>
          </div>

          {/* Upload */}
          <div className="panel-section">
            <div className="section-label">Medical Image</div>
            <div
              className={`upload-zone ${dragOver?'drag-over':''}`}
              onClick={() => fileRef.current?.click()}
              onDragOver={e => { e.preventDefault(); setDragOver(true); }}
              onDragLeave={() => setDragOver(false)}
              onDrop={handleDrop}
            >
              <div className="upload-icon">{image ? '✅' : '🏥'}</div>
              <div className="upload-title">{image ? 'Image loaded — ready to analyze' : 'Drop your scan here'}</div>
              <div className="upload-sub">Click or drag & drop a medical image<br/>JPG, PNG, WEBP, TIFF supported</div>
              <div className="upload-types">
                <span className="type-tag">X-Ray</span>
                <span className="type-tag">MRI</span>
                <span className="type-tag">CT Scan</span>
                <span className="type-tag">Ultrasound</span>
              </div>
            </div>
            <input
              ref={fileRef}
              type="file"
              accept="image/*"
              onChange={e => handleFile(e.target.files[0])}
            />
            {image && (
              <div className="preview-area" style={{marginTop:12}}>
                <img src={image} alt="Scan preview" />
                <div className="preview-overlay">{SCAN_TYPES.find(s=>s.id===scanType)?.label}</div>
                <button className="preview-remove" onClick={() => { setImage(null); setImageBase64(null); setReport(null); }}>✕ Remove</button>
              </div>
            )}
          </div>

          {/* Patient Info */}
          <div className="panel-section">
            <div className="section-label">Patient Information</div>
            <div className="form-row">
              <label className="form-label">Patient Name</label>
              <input
                className="form-input"
                placeholder="Enter patient name"
                value={patientInfo.name}
                onChange={e => setPatientInfo({...patientInfo, name:e.target.value})}
              />
            </div>
            <div className="form-row form-row-2">
              <div>
                <label className="form-label">Age</label>
                <input
                  className="form-input"
                  type="number"
                  placeholder="Years"
                  value={patientInfo.age}
                  onChange={e => setPatientInfo({...patientInfo, age:e.target.value})}
                />
              </div>
              <div>
                <label className="form-label">Gender</label>
                <select
                  className="form-select"
                  value={patientInfo.gender}
                  onChange={e => setPatientInfo({...patientInfo, gender:e.target.value})}
                >
                  <option value="">Select</option>
                  <option value="male">Male</option>
                  <option value="female">Female</option>
                  <option value="other">Other</option>
                </select>
              </div>
            </div>
            <div className="form-row">
              <label className="form-label">Symptoms / Clinical Notes</label>
              <textarea
                className="form-input"
                rows={3}
                placeholder="Describe symptoms, clinical history, or reason for scan..."
                value={patientInfo.symptoms}
                onChange={e => setPatientInfo({...patientInfo, symptoms:e.target.value})}
                style={{resize:'vertical'}}
              />
            </div>
          </div>

          {/* Analyze Button */}
          <div className="panel-section">
            <button className="analyze-btn" onClick={analyze} disabled={loading||!image}>
              {loading ? (
                <>
                  <span style={{display:'inline-block',animation:'spin 1s linear infinite'}}>⚙️</span>
                  Analyzing...
                </>
              ) : (
                <>🔬 Analyze Scan</>
              )}
            </button>
            <div style={{marginTop:12,fontSize:10,color:'var(--text3)',textAlign:'center',lineHeight:1.6}}>
              Analysis uses GEMMA_API_KEY environment variable.<br/>
              Configure in Vercel → Settings → Environment Variables.
            </div>
          </div>

        </div>

        {/* Right Panel */}
        <div className="right-panel">
          {loading ? (
            <LoadingScreen step={loadStep} />
          ) : report ? (
            <ReportView report={report} scanType={scanType} patientInfo={patientInfo} image={image} />
          ) : (
            <div className="welcome-screen">
              <div className="welcome-glyph">🔬</div>
              <div className="welcome-title">AI Medical Imaging Analysis</div>
              <div className="welcome-sub">
                Upload an X-Ray, MRI, or CT scan and let our AI generate a comprehensive clinical report with findings, patient advice, and specialist referrals.
              </div>
              <div className="feature-grid">
                <div className="feature-card">
                  <div className="feature-card-icon">🫁</div>
                  <div className="feature-card-title">X-Ray Analysis</div>
                  <div className="feature-card-desc">Chest, bone, dental and other radiographic images</div>
                </div>
                <div className="feature-card">
                  <div className="feature-card-icon">🧠</div>
                  <div className="feature-card-title">MRI Reports</div>
                  <div className="feature-card-desc">Brain, spine, musculoskeletal and soft tissue</div>
                </div>
                <div className="feature-card">
                  <div className="feature-card-icon">⚕️</div>
                  <div className="feature-card-title">CT Scans</div>
                  <div className="feature-card-desc">Full body, organ and vascular imaging</div>
                </div>
                <div className="feature-card">
                  <div className="feature-card-icon">👨‍⚕️</div>
                  <div className="feature-card-title">Doctor Advice</div>
                  <div className="feature-card-desc">Clinical recommendations for healthcare providers</div>
                </div>
                <div className="feature-card">
                  <div className="feature-card-icon">💊</div>
                  <div className="feature-card-title">Patient Guide</div>
                  <div className="feature-card-desc">Simple, clear instructions and lifestyle advice</div>
                </div>
                <div className="feature-card">
                  <div className="feature-card-icon">🌟</div>
                  <div className="feature-card-title">Find Specialists</div>
                  <div className="feature-card-desc">Top doctors and referral recommendations</div>
                </div>
              </div>
            </div>
          )}
        </div>
      </div>

      {toast && <div className="toast">{toast}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
